services:
  api:
    build: .
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/appdb?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
     - "5432:5432"
    volumes:
     - pgdata:/var/lib/postgresql/data
  
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
     - "5050:80"
    depends_on:
     - postgres

volumes:
  pgdata: